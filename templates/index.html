<!DOCTYPE html>
<html>
<head>
    <title>NL Query System</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #2c2c54);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: #2f2f46;
            padding: 30px;
            border-radius: 12px;
            width: 600px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 65%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            outline: none;
            font-size: 14px;
        }

        button {
            padding: 10px 15px;
            margin-left: 10px;
            border: none;
            border-radius: 6px;
            background: #4CAF50;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #45a049;
        }

        #output {
            margin-top: 20px;
            text-align: left;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background: #1e1e2f;
        }

        th, td {
            padding: 8px;
            border: 1px solid #444;
            text-align: center;
        }

        th {
            background: #4CAF50;
        }

        .sql-box {
            background: #1e1e2f;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 13px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>NL Query System</h2>

    <input id="query" placeholder="e.g. top students">
    <button onclick="sendQuery()">Submit</button>

    <div id="output"></div>
</div>

<script>
function sendQuery() {
    const query = document.getElementById("query").value;

    fetch("/query", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({query: query})
    })
    .then(res => res.json())
    .then(data => {
        let output = "";

        if (data.error) {
            output = "<p style='color:red'>" + data.error + "</p>";
        } else {
            // SQL display
            output += "<div class='sql-box'><b>SQL:</b> " + data.sql + "</div>";

            // Table display
            output += "<table>";
            output += "<tr><th>ID</th><th>Name</th><th>Age</th><th>Branch</th><th>Marks</th></tr>";

            data.result.forEach(row => {
                output += "<tr>";
                row.forEach(cell => {
                    output += "<td>" + cell + "</td>";
                });
                output += "</tr>";
            });

            output += "</table>";
        }

        document.getElementById("output").innerHTML = output;
    });
}
</script>

</body>
</html>
